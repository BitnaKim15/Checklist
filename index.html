<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설레는 여행 체크리스트 ✈️</title>
    <!-- Tailwind CSS 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Noto Sans KR) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght=300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #7dd3fc; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(241, 245, 249, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gradient-to-tr from-sky-50 via-slate-50 to-blue-50 min-h-screen text-slate-800 transition-colors duration-300">

    <div class="max-w-7xl mx-auto px-4 py-8 md:py-12">
        <header class="flex flex-col lg:flex-row justify-between items-center mb-10 gap-6">
            <div class="text-center lg:text-left">
                <span class="bg-sky-100 text-sky-800 text-xs font-bold px-3 py-1.5 rounded-full uppercase tracking-wider">Perfect Travel Planner ✈️</span>
                <h1 class="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-sky-600 to-indigo-600 tracking-tight mt-2 flex items-center justify-center lg:justify-start gap-2">
                    <span>🎒</span> 두 갈래 여행 체크리스트
                </h1>
                <p class="text-slate-500 mt-1 text-sm md:text-base">필수 예약과 캐리어 패킹을 나누어서 훨씬 더 꼼꼼하게 관리해 보세요~</p>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-4 w-full lg:w-auto items-stretch">
                <div class="flex flex-col gap-4 flex-1 sm:flex-none min-w-[290px] sm:min-w-[360px]">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-sky-100/50 flex items-center gap-3 flex-1">
                        <div class="bg-sky-50 p-2.5 rounded-xl text-sky-600 flex-shrink-0">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="text-xs text-slate-400 font-semibold mb-2">여행 기간 설정</div>
                            <div class="flex items-center gap-1.5 flex-nowrap w-full">
                                <input type="date" id="start-date" onchange="calculateTravelPeriod()" class="text-xs font-bold text-slate-700 focus:outline-none border-b border-sky-200 py-0.5 leading-none cursor-pointer w-[95px] sm:w-28 flex-shrink-0">
                                <span class="text-slate-300 text-xs font-bold flex-shrink-0">~</span>
                                <input type="date" id="end-date" onchange="calculateTravelPeriod()" class="text-xs font-bold text-slate-700 focus:outline-none border-b border-sky-200 py-0.5 leading-none cursor-pointer w-[95px] sm:w-28 flex-shrink-0">
                            </div>
                            <div id="dday-display" class="text-xs font-bold text-sky-600 mt-2">출발 날짜를 클릭해 주세요! 🗓️</div>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-2xl shadow-sm border border-sky-100/50 flex items-center gap-3 flex-1 sm:flex-none sm:min-w-[240px]">
                    <div class="bg-emerald-50 p-2.5 rounded-xl text-emerald-600 flex-shrink-0">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <div class="flex-1">
                        <div class="text-xs text-slate-400 font-semibold uppercase tracking-wider">전체 준비 진행률</div>
                        <div class="flex items-baseline gap-1.5">
                            <span id="total-ratio" class="text-xl font-black text-slate-800">0%</span>
                            <span id="total-count" class="text-xs text-slate-500">(0/0개 완료)</span>
                        </div>
                        <div class="w-full bg-slate-100 h-1.5 rounded-full mt-1.5 overflow-hidden"><div id="total-progress-bar" class="bg-emerald-500 h-1.5 rounded-full transition-all duration-500" style="width: 0%"></div></div>
                    </div>
                </div>
            </div>
        </header>

        <div id="toast-message" class="fixed bottom-5 right-5 bg-slate-900 text-white px-5 py-3 rounded-2xl shadow-xl z-50 flex items-center gap-2.5 opacity-0 pointer-events-none transition-all duration-300 transform translate-y-2">
            <span class="text-base">💡</span>
            <span id="toast-text" class="text-sm font-medium">성공적으로 반영되었습니다!</span>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <section class="lg:col-span-4 bg-white p-6 rounded-3xl shadow-sm border border-slate-100/80">
                <h2 class="text-lg font-bold text-slate-800 mb-5 flex items-center gap-2 border-b border-slate-100 pb-3">
                    <span class="text-sky-500">✍️</span> 여행 체크리스트 등록
                </h2>
                
                <form id="todo-form" onsubmit="addTask(event)" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">어디에 등록할까요?</label>
                        <div class="grid grid-cols-2 gap-2">
                            <label class="cursor-pointer"><input type="radio" name="listType" value="essential" class="peer sr-only" checked><div class="text-center py-3 rounded-xl border-2 border-slate-200 text-xs font-bold text-slate-500 peer-checked:bg-indigo-50 peer-checked:border-indigo-500 peer-checked:text-indigo-600 transition-all">🎫 예약 및 필수</div></label>
                            <label class="cursor-pointer"><input type="radio" name="listType" value="packing" class="peer sr-only"><div class="text-center py-3 rounded-xl border-2 border-slate-200 text-xs font-bold text-slate-500 peer-checked:bg-sky-50 peer-checked:border-sky-500 peer-checked:text-sky-600 transition-all">🧳 캐리어 짐싸기</div></label>
                        </div>
                    </div>
                    <div>
                        <label for="task-content" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">무엇을 해야 하나요?</label>
                        <input type="text" id="task-content" placeholder="준비물을 입력하세요..." class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-4 focus:ring-sky-500/10 transition-all text-sm font-medium" required>
                    </div>
                    <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-sky-500 to-indigo-600 text-white rounded-xl font-bold text-sm shadow-lg hover:shadow-sky-200 transition-all">체크리스트에 추가</button>
                </form>
            </section>

            <section class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100/80 space-y-4">
                        <h3 class="font-bold text-slate-800">🎫 예약 및 필수 리스트</h3>
                        <div id="essential-list" class="space-y-3 max-h-[380px] overflow-y-auto custom-scrollbar"></div>
                    </div>
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100/80 space-y-4">
                        <h3 class="font-bold text-slate-800">🧳 캐리어 짐싸기 리스트</h3>
                        <div id="packing-list" class="space-y-3 max-h-[380px] overflow-y-auto custom-scrollbar"></div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const isFirebaseConfigured = typeof __firebase_config !== 'undefined' && __firebase_config;

        let db, user;
        let todos = JSON.parse(localStorage.getItem('my_travel_todos') || '[]');

        // 로컬스토리지 저장 함수
        function saveToLocal() {
            localStorage.setItem('my_travel_todos', JSON.stringify(todos));
        }

        // 렌더링 로직 (로컬스토리지 우선 반영)
        function renderTodos() {
            const essentialList = document.getElementById('essential-list');
            const packingList = document.getElementById('packing-list');
            
            essentialList.innerHTML = todos.filter(t => t.listType === 'essential').map(t => createItemHtml(t)).join('');
            packingList.innerHTML = todos.filter(t => t.listType === 'packing').map(t => createItemHtml(t)).join('');
            
            // 통계 계산
            const total = todos.length;
            const done = todos.filter(t => t.completed).length;
            const ratio = total ? Math.round((done/total)*100) : 0;
            document.getElementById('total-ratio').innerText = ratio + '%';
            document.getElementById('total-count').innerText = `(${done}/${total}개 완료)`;
            document.getElementById('total-progress-bar').style.width = ratio + '%';
        }

        function createItemHtml(todo) {
            return `
                <div class="flex items-center justify-between p-3 border rounded-xl ${todo.completed ? 'opacity-50 line-through' : ''}">
                    <span>${todo.content}</span>
                    <div class="flex gap-2">
                        <button onclick="window.toggleTodo('${todo.id}')" class="text-sky-600 font-bold">체크</button>
                        <button onclick="window.deleteTodo('${todo.id}')" class="text-rose-500 font-bold">삭제</button>
                    </div>
                </div>`;
        }

        // 할 일 추가
        window.addTask = (e) => {
            e.preventDefault();
            const content = document.getElementById('task-content').value;
            const listType = document.querySelector('input[name="listType"]:checked').value;
            const newTodo = { id: Date.now().toString(), content, listType, completed: false };
            
            todos.unshift(newTodo);
            saveToLocal();
            renderTodos();
            document.getElementById('task-content').value = '';
            
            // Firebase 동기화 (기존 로직 유지)
            if (user) addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'todos'), newTodo);
        };

        window.toggleTodo = (id) => {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveToLocal();
                renderTodos();
                if (user) updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'todos', id), { completed: todo.completed });
            }
        };

        window.deleteTodo = (id) => {
            todos = todos.filter(t => t.id !== id);
            saveToLocal();
            renderTodos();
            if (user) deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'todos', id));
        };

        // 초기화
        renderTodos();
        if (isFirebaseConfigured) {
            const app = initializeApp(JSON.parse(__firebase_config));
            db = getFirestore(app);
            signInAnonymously(getAuth(app)).then(cred => {
                user = cred.user;
                // 여기에서 Firebase 데이터와 로컬스토리지 병합 로직 추가 가능
            });
        }
    </script>
</body>
</html>
